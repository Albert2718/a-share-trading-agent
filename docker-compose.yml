name: ashare-research-platform

services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.0
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    image: ashare-research-platform-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:////workspace/data/app.db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      FASTEMBED_CACHE_PATH: /workspace/data/models
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    image: ashare-research-platform-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=INFO --pool=solo
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:////workspace/data/app.db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      FASTEMBED_CACHE_PATH: /workspace/data/models
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  beat:
    image: ashare-research-platform-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.workers.celery_app:celery_app beat --loglevel=INFO --schedule=/workspace/data/celerybeat-schedule
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:////workspace/data/app.db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      FASTEMBED_CACHE_PATH: /workspace/data/models
    volumes:
      - .:/workspace
    depends_on:
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      DOCKER_ENV: "1"
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
    depends_on:
      - api

volumes:
  qdrant_data:
